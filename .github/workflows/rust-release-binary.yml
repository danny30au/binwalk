name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3). Required when publish_release is true.'
        required: false
        default: ''
      publish_release:
        description: 'Publish a GitHub release after building'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

          - os-name: Linux-aarch64
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          - os-name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin

          - os-name: macOS-aarch64
            runs-on: macos-latest
            target: aarch64-apple-darwin

          - os-name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc

          - os-name: Windows-aarch64
            runs-on: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag != '') && inputs.tag || github.ref }}

      - name: Validate tag input
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
        shell: bash
        run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            echo "::error::A 'tag' input is required when 'publish_release' is true."
            exit 1
          fi
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+.[0-9]+.[0-9]+ ]]; then
            echo "::error::Tag '${{ inputs.tag }}' must match v* format (e.g. v1.2.3)."
            exit 1
          fi

      - name: Update CHANGELOG
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true && inputs.tag != '')
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          writeToFile: true
          changelogFilePath: "CHANGELOG.md"

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true

      - name: Publish artifacts and release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true && inputs.tag != '')
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: binwalk
          target: ${{ matrix.platform.target }}
          release-tag-prefix: v
          changes-file: "CHANGELOG.md"
          action-gh-release-parameters: |
            {
              "draft": false,
              "prerelease": false,
              "overwrite": true,
              "generate_release_notes": true,
              "make_latest": true,
              "body_path": "CHANGELOG.md",
              "token": "${{ secrets.GITHUB_TOKEN }}"
            }

      - name: Commit CHANGELOG.md
        if: (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true && inputs.tag != '')) && matrix.platform.os-name == 'Linux-x86_64'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          branch: master
          commit_message: 'docs: update CHANGELOG.md for ${{ inputs.tag != '' && inputs.tag || github.ref_name }} [skip ci]'
          file_pattern: CHANGELOG.md
